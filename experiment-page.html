	    }

	    function promptOptions(selectedId) {
	      const project = currentProject();
	      const prompts = project ? project.promptVersions : [];
	      return '<option value="">选择 Prompt</option>' + prompts.map((prompt) =>
	        `<option value="${escapeHtml(prompt.id)}" ${prompt.id === selectedId ? "selected" : ""}>${escapeHtml(prompt.name)}</option>`
	      ).join("");
	    }

	    function modelOptions(selectedId) {
	      return '<option value="">选择模型</option>' + state.models.map((model) =>
	        `<option value="${escapeHtml(model.id)}" ${model.id === selectedId ? "selected" : ""}>${escapeHtml(model.name)} · ${escapeHtml(model.model)}</option>`
	      ).join("");
	    }

	    function renderWorkflowEditor() {
	      const workflow = ensureWorkflowSelection();
	      $("addWorkflowStepBtn").disabled = !workflow;
	      if (!workflow) {
	        $("workflowStepList").innerHTML = '<div class="empty">先新建一条链路。</div>';
	        return;
	      }
	      $("workflowStepList").innerHTML = workflow.steps.length ? workflow.steps.map((step, index) => `
	        <article class="step-row" data-step-index="${index}">
	          <div class="step-head">
	            <strong>${index + 1}. ${escapeHtml(step.name || `Step ${index + 1}`)}</strong>
	            <div class="step-actions">
	              <button class="quiet" data-step-action="up" type="button" ${index === 0 ? "disabled" : ""}>上移</button>
	              <button class="quiet" data-step-action="down" type="button" ${index === workflow.steps.length - 1 ? "disabled" : ""}>下移</button>
	              <button class="danger" data-step-action="delete" type="button">删除</button>
	            </div>
	          </div>
	          <label>步骤名称</label>
	          <input data-step-field="name" value="${escapeHtml(step.name)}" />
	          <div class="step-fields">
	            <div>
	              <label>Prompt</label>
	              <select data-step-field="promptVersionId">${promptOptions(step.promptVersionId)}</select>
	            </div>
	            <div>
	              <label>模型</label>
	              <select data-step-field="modelConfigId">${modelOptions(step.modelConfigId)}</select>
	            </div>
	          </div>
	          <div class="step-fields">
	            <div>
	              <label>输出变量</label>
	              <input data-step-field="outputVariable" value="${escapeHtml(step.outputVariable)}" placeholder="summary" />
	            </div>
	            <div>
	              <label>失败策略</label>
	              <label class="inline-check">
	                <input data-step-field="stopOnError" type="checkbox" ${step.stopOnError !== false ? "checked" : ""} />
	                <span>失败即停止</span>
	              </label>
	            </div>
	          </div>
	        </article>
	      `).join("") : '<div class="empty">还没有 Step。</div>';
	    }

	    function workflowProducedVariables(workflow) {
	      const produced = new Set();
	      (workflow && workflow.steps || []).forEach((step) => {
	        const name = String(step.outputVariable || "").trim();
	        if (name) produced.add(name);
	      });
	      return produced;
	    }

	    function workflowInitialVariableNames(workflow) {
	      if (!workflow) return [];
	      const produced = new Set();
	      const names = [];
	      workflow.steps.forEach((step) => {
	        const prompt = promptById(step.promptVersionId);
	        templateVariables(prompt && prompt.systemPrompt, prompt && prompt.userPrompt).forEach((name) => {
	          if (name.startsWith("steps.")) return;
	          if (!produced.has(name) && !names.includes(name)) names.push(name);
	        });
	        const output = String(step.outputVariable || "").trim();
	        if (output) produced.add(output);
	      });
	      return names;
	    }

	    function readWorkflowInitialValues() {
	      const values = {};
	      document.querySelectorAll("[data-workflow-variable]").forEach((input) => {
	        values[input.dataset.workflowVariable] = input.value;
	      });
	      return values;
	    }

	    function renderWorkflowInitialVariables() {
	      const workflow = currentWorkflow();
	      if (!workflow) {
	        $("workflowInitialList").innerHTML = '<div class="empty">先选择链路。</div>';
	        return;
	      }
	      const names = workflowInitialVariableNames(workflow);
	      const values = workflow.draft && workflow.draft.initialValues || {};
	      if (!names.length) {
	        $("workflowInitialList").innerHTML = '<div class="empty">当前链路没有需要运行前填写的变量。</div>';
	        return;
	      }
	      $("workflowInitialList").innerHTML = names.map((name) => `
	        <label class="variable-row">
	          <span class="variable-label">
	            <strong>{{${escapeHtml(name)}}}</strong>
	            <small>初始输入</small>
	          </span>
	          <input data-workflow-variable="${escapeHtml(name)}" value="${escapeHtml(values[name] || "")}" />
	        </label>
	      `).join("");
	    }

	    function renderContextValues(values, emptyText = "暂无变量。") {
	      const entries = Object.entries(values || {});
	      if (!entries.length) return `<div class="empty">${emptyText}</div>`;
	      return entries.map(([name, value]) => `
	        <div class="context-kv">
	          <strong>${escapeHtml(name)}</strong>
	          <span>${escapeHtml(value)}</span>
	        </div>
	      `).join("");
	    }

	    function renderTraceDetails(trace) {
	      if (!trace) return '<div class="empty">选择一次运行后查看 Step 详情。</div>';
	      const answer = trace.status === "success"
	        ? renderAnswer(trace, "detail-answer")
	        : `<div class="answer detail-answer">${escapeHtml(trace.error || "请求失败。")}</div>`;
	      return `
	        <div class="cell-meta">
	          <span class="pill ${trace.status === "success" ? "ok" : "bad"}">${trace.status === "success" ? "成功" : "失败"}</span>
	          <span class="pill">${Math.round(trace.elapsedMs || 0)} ms</span>
	          <span class="pill">token ${escapeHtml(trace.tokens || "-")}</span>
	        </div>
	        <div class="detail-grid">
	          <div class="detail-block"><strong>读取变量</strong>${renderContextValues(trace.inputValues, "未读取变量。")}</div>
	          ${trace.missingVariables && trace.missingVariables.length ? `<div class="detail-block"><strong>缺失变量</strong>${detailPre(trace.missingVariables)}</div>` : ""}
	          <div class="detail-block"><strong>System Prompt</strong>${detailPre(trace.promptSnapshot && trace.promptSnapshot.finalSystemPrompt || "")}</div>
	          <div class="detail-block"><strong>User Prompt</strong>${detailPre(trace.promptSnapshot && trace.promptSnapshot.finalUserPrompt || "")}</div>
	          <div class="detail-block"><strong>模型输出</strong>${answer}</div>
	          <div class="detail-block"><strong>写入变量</strong>${renderContextValues(trace.writtenValues, "未写入变量。")}</div>
	          <details>
	            <summary>技术详情</summary>
	            <div class="detail-grid">
	              <div class="detail-block"><strong>运行模型</strong>${detailPre(trace.modelSnapshot || {})}</div>
	              <div class="detail-block"><strong>请求预览</strong>${detailPre(trace.requestPreview || {})}</div>
	              <div class="detail-block"><strong>原始 JSON</strong>${detailPre(trace.raw || {})}</div>
	              <div class="detail-block"><strong>本步后上下文</strong>${detailPre(trace.contextAfter || {})}</div>
	            </div>
	          </details>
	        </div>
	      `;
	    }

	    function renderWorkflowRun() {
	      const run = state.currentWorkflowRun;
	      if (!run) {
	        $("workflowRunMeta").textContent = "还没有运行记录。";
	        $("workflowResultHost").innerHTML = '<div class="empty" style="padding:14px">填写初始变量后运行链路。</div>';
	        $("workflowContextHost").innerHTML = "";
	        return;
	      }
	      const traces = run.stepTraces || [];
	      if (state.workflowTraceIndex >= traces.length) state.workflowTraceIndex = 0;
	      const trace = traces[state.workflowTraceIndex];
	      $("workflowRunMeta").textContent = `${formatTime(run.createdAt)} · ${traces.length} 个 Step · ${run.status === "success" ? "成功" : "失败"} · ${Math.round(run.elapsedMs || 0)} ms`;
	      $("workflowResultHost").innerHTML = `
	        <div class="workflow-run-grid" style="padding:10px">
	          <div class="trace-list">
	            ${traces.map((item, index) => `
	              <button class="trace-row ${index === state.workflowTraceIndex ? "active" : ""}" data-trace-index="${index}" type="button">
	                <strong>${escapeHtml(item.stepIndex)}. ${escapeHtml(item.stepName)}</strong>
	                <small>${item.status === "success" ? "成功" : "失败"} · ${Math.round(item.elapsedMs || 0)} ms</small>
	              </button>
	            `).join("") || '<div class="empty">没有 Step Trace。</div>'}
	          </div>
	          <div>${renderTraceDetails(trace)}</div>
	        </div>
	      `;
	      $("workflowContextHost").innerHTML = `
	        <div class="detail-block"><strong>最终上下文</strong>${renderContextValues(run.finalContext)}</div>
	      `;
	    }

	    function renderWorkflowHistory() {
	      const runs = state.workflowRunSummaries.filter((run) => run.projectId === state.projectId);
	      $("workflowHistoryList").innerHTML = runs.length ? runs.map((run) => `
	        <button class="history-item" data-workflow-run-id="${escapeHtml(run.id)}">
	          <strong>${escapeHtml(formatTime(run.createdAt))}</strong>
	          <small>${escapeHtml(run.workflowName)} · ${run.status === "success" ? "成功" : "失败"} · ${run.successCount}/${run.totalCount} Step</small>
	          <small>${escapeHtml((run.variablePreview || "").slice(0, 68))}</small>
	        </button>
	      `).join("") : '<div class="empty">还没有链路历史。</div>';
	    }

	    function renderWorkflows() {
	      ensureWorkflowSelection();
	      renderWorkflowList();
	      renderWorkflowEditor();
	      renderWorkflowInitialVariables();
	      renderWorkflowRun();
	      renderWorkflowHistory();
	    }

	    function renderDraft() {
	      const project = currentProject();
	      if (!project) return;
	      renderPromptVersions();
	      renderModelSelectors();
	      renderVariables();
	      renderVariableSamples();
	      renderWorkflows();
	    }

    function readVariableValues() {
      const values = {};
      document.querySelectorAll("[data-variable]").forEach((input) => {
        values[input.dataset.variable] = input.value;
      });
      return values;
    }

    function draftPayload() {
      return {
        variableValues: readVariableValues(),
        selectedPromptVersionIds: selectedPromptIds(),
        selectedModelConfigIds: selectedModelIds()
      };
    }

    function scheduleDraftSave(refreshVariables = true) {
      const project = currentProject();
      if (!project) return;
      project.draft = draftPayload();
      if (refreshVariables) renderVariables();
      clearTimeout(draftTimer);
      draftTimer = setTimeout(async () => {
        try {
          const updated = await api(`/api/projects/${project.id}`, {
            method: "PUT",
            body: JSON.stringify({ draft: project.draft })
          });
          Object.assign(project, updated);
        } catch (error) {
          showStatus(error.message, true);
        }
      }, 260);
    }

    function formatTime(value) {
      return value ? new Date(value).toLocaleString() : "-";
    }

    function renderHistory() {
      const runs = state.runSummaries.filter((run) => run.projectId === state.projectId);
      $("historyList").innerHTML = runs.length ? runs.map((run) => `
        <button class="history-item" data-run-id="${escapeHtml(run.id)}">
          <strong>${escapeHtml(formatTime(run.createdAt))}</strong>
          <small>${escapeHtml(run.promptNames.join(" / "))} × ${escapeHtml(run.modelNames.join(" / "))}</small>
          <small>${run.successCount}/${run.totalCount} 成功 · ${escapeHtml((run.variablePreview || run.input || "").slice(0, 68))}</small>
        </button>
      `).join("") : '<div class="empty">还没有历史。</div>';
    }

    function cellFor(run, promptId, modelId) {
      return run.cells.find((cell) => cell.promptVersionId === promptId && cell.modelConfigId === modelId);
    }

    function renderAnswer(cell, answerClass = "") {
      if (cell.status !== "success") {
        return `<div class="answer ${answerClass}">${escapeHtml(cell.error || "请求失败。")}</div>`;
      }
      if (state.markdownMode === "render") {
        return `<div class="answer rendered ${answerClass}">${renderMarkdown(cell.answer || "")}</div>`;
      }
      return `<div class="answer ${answerClass}">${escapeHtml(cell.answer || "模型没有返回文本。")}</div>`;
    }

    function detailPre(value) {
      return `<pre>${escapeHtml(typeof value === "string" ? value : JSON.stringify(value, null, 2))}</pre>`;
    }

    function renderCell(cell) {
      if (!cell) return '<div class="empty">无结果。</div>';
      return `
        <div class="cell" data-open-cell="${escapeHtml(cell.promptVersionId)}::${escapeHtml(cell.modelConfigId)}">
          <div class="cell-meta">
            <span class="pill ${cell.status === "success" ? "ok" : "bad"}">${cell.status === "success" ? "成功" : "失败"}</span>
            <span class="pill">${Math.round(cell.elapsedMs || 0)} ms</span>
            <span class="pill">token ${escapeHtml(cell.tokens || "-")}</span>
          </div>
          ${renderAnswer(cell, "preview")}
          <button class="quiet cell-read" type="button">展开阅读</button>
        </div>
      `;
    }

    function renderCellDetails(cell) {
      return `
        <div class="cell-meta">
          <span class="pill ${cell.status === "success" ? "ok" : "bad"}">${cell.status === "success" ? "成功" : "失败"}</span>
          <span class="pill">${Math.round(cell.elapsedMs || 0)} ms</span>
          <span class="pill">token ${escapeHtml(cell.tokens || "-")}</span>
        </div>
        ${renderAnswer(cell, "detail-answer")}
        <div class="detail-grid">
          ${cell.reasoningContent ? `<div class="detail-block"><strong>思考内容</strong>${detailPre(cell.reasoningContent)}</div>` : ""}
          <div class="detail-block"><strong>System Prompt</strong>${detailPre(cell.promptSnapshot.finalSystemPrompt)}</div>
          <div class="detail-block"><strong>User Prompt</strong>${detailPre(cell.promptSnapshot.finalUserPrompt)}</div>
          <details>
            <summary>技术详情</summary>
            <div class="detail-grid">
              <div class="detail-block"><strong>运行模型</strong>${detailPre(cell.modelSnapshot)}</div>
              <div class="detail-block"><strong>请求预览</strong>${detailPre(cell.requestPreview)}</div>
              <div class="detail-block"><strong>原始 JSON</strong>${detailPre(cell.raw || {})}</div>
            </div>
          </details>
        </div>
      `;
    }

    function detailCell() {
      const run = state.currentRun;
      if (!run || !state.detailCellKey) return null;
      const [promptId, modelId] = state.detailCellKey.split("::");
      return cellFor(run, promptId, modelId);
    }

    function renderDetail() {
      const cell = detailCell();
      if (!cell) return setDetail(false);
      $("detailTitle").textContent = `${cell.promptSnapshot.name} × ${cell.modelSnapshot.name}`;
      $("detailBody").innerHTML = renderCellDetails(cell);
    }

    function setDetail(open, cellKey = state.detailCellKey) {
      state.detailCellKey = open ? cellKey : "";
      $("detailDrawer").classList.toggle("hidden", !open);
      $("detailBackdrop").classList.toggle("hidden", !open);
      $("detailDrawer").setAttribute("aria-hidden", open ? "false" : "true");
      document.body.classList.toggle("detail-open", open);
      if (open) renderDetail();
    }

    function renderMatrix() {
      const run = state.currentRun;
      $("matrixHost").innerHTML = `
        <table class="matrix">
          <colgroup>
            <col class="prompt-col" />
            ${run.modelSnapshots.map(() => '<col class="model-col" />').join("")}
          </colgroup>
          <thead>
            <tr>
              <th>Prompt</th>
              ${run.modelSnapshots.map((model) => `<th>${escapeHtml(model.name)}<br><span class="muted">${escapeHtml(model.model)}</span></th>`).join("")}
            </tr>
          </thead>
          <tbody>
            ${run.promptSnapshots.map((prompt) => `
              <tr>
                <td>${escapeHtml(prompt.name)}</td>
                ${run.modelSnapshots.map((model) => `<td>${renderCell(cellFor(run, prompt.id, model.id))}</td>`).join("")}
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderCompare() {
      const run = state.currentRun;
      if (!state.comparePromptId || !run.promptSnapshots.some((prompt) => prompt.id === state.comparePromptId)) {
        state.comparePromptId = run.promptSnapshots[0].id;
      }
      const prompt = run.promptSnapshots.find((item) => item.id === state.comparePromptId);
      $("comparePromptSelect").value = state.comparePromptId;
      $("matrixHost").innerHTML = `
        <div class="compare-strip">
          ${run.modelSnapshots.map((model) => {
            const cell = cellFor(run, prompt.id, model.id);
            return `
              <article class="compare-card">
                <div class="panel-head">
                  <div>
                    <h3>${escapeHtml(model.name)}</h3>
                    <div class="muted">${escapeHtml(model.model)}</div>
                  </div>
                  <button class="quiet" data-open-cell="${escapeHtml(prompt.id)}::${escapeHtml(model.id)}" type="button">详情</button>
                </div>
                ${cell ? `
                  <div class="cell-meta">
                    <span class="pill ${cell.status === "success" ? "ok" : "bad"}">${cell.status === "success" ? "成功" : "失败"}</span>
                    <span class="pill">${Math.round(cell.elapsedMs || 0)} ms</span>
                    <span class="pill">token ${escapeHtml(cell.tokens || "-")}</span>
                  </div>
                  ${renderAnswer(cell, "compare-answer")}
                ` : '<div class="empty">无结果。</div>'}
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderResult() {
      const run = state.currentRun;
      $("rawModeBtn").classList.toggle("active", state.markdownMode === "raw");
      $("renderModeBtn").classList.toggle("active", state.markdownMode === "render");
      $("matrixViewBtn").classList.toggle("active", state.resultView === "matrix");
      $("compareViewBtn").classList.toggle("active", state.resultView === "compare");
      $("comparePromptSelect").classList.toggle("hidden", state.resultView !== "compare" || !run);
      if (!run) {
        $("matrixHost").innerHTML = '<div class="empty" style="padding:14px">选择 Prompt 和模型后运行。</div>';
        $("runMeta").textContent = "还没有运行记录。";
        $("comparePromptSelect").innerHTML = "";
        setDetail(false);
        return;
      }
      $("runMeta").textContent = `${formatTime(run.createdAt)} · ${run.promptSnapshots.length} 个 Prompt × ${run.modelSnapshots.length} 个模型`;
      $("comparePromptSelect").innerHTML = run.promptSnapshots.map((prompt) =>
        `<option value="${escapeHtml(prompt.id)}">${escapeHtml(prompt.name)}</option>`
      ).join("");
      if (state.resultView === "compare") {
        renderCompare();
      } else {
        renderMatrix();
      }
      if (state.detailCellKey) renderDetail();
    }

    function renderRunProgress(combinationCount) {
      $("runMeta").textContent = `实验进行中 · ${combinationCount} 个组合等待返回`;
      $("matrixHost").setAttribute("aria-busy", "true");
      $("matrixHost").innerHTML = `
        <div class="run-progress">
          <strong>正在运行实验矩阵</strong>
          <div class="muted">当前请求会在所有组合完成后统一返回。思考模型和长输入可能需要更久。</div>
          <div class="run-progress-bar" aria-hidden="true"></div>
        </div>
      `;
    }

    function renderModelList() {
      $("modelList").innerHTML = state.models.length ? state.models.map((model) => `
        <button class="model-row ${model.id === state.modelId ? "active" : ""}" data-edit-model="${escapeHtml(model.id)}">
          <strong>${escapeHtml(model.name)}</strong>
          <small>${escapeHtml(providerLabel(model.provider))} · ${escapeHtml(model.model)} · ${escapeHtml(thinkingLabel(model.thinkingMode))}</small>
          <small>${escapeHtml(model.baseUrl)}</small>
        </button>
      `).join("") : '<div class="empty">还没有模型。</div>';
    }

    function providerLabel(provider) {
      return PROVIDER_PRESETS[provider] ? PROVIDER_PRESETS[provider].label : PROVIDER_PRESETS.custom.label;
    }

    function thinkingLabel(mode) {
      if (mode === "enabled") return "思考开启";
      if (mode === "disabled") return "思考关闭";
      return "思考默认";
    }

    function renderProviderOptions() {
      $("modelProvider").innerHTML = Object.entries(PROVIDER_PRESETS).map(([value, preset]) =>
        `<option value="${escapeHtml(value)}">${escapeHtml(preset.label)}</option>`
      ).join("");
    }

    function applyProviderPreset(provider) {
      const preset = PROVIDER_PRESETS[provider] || PROVIDER_PRESETS.custom;
      $("modelApiType").value = preset.apiType;
      $("modelCode").placeholder = preset.modelPlaceholder;
      if (preset.baseUrl) $("modelBaseUrl").value = preset.baseUrl;
    }

    function fillModelForm(model = null) {
      state.modelId = model ? model.id : "";
      $("modelFormTitle").textContent = model ? "编辑模型" : "新增模型";
      $("modelName").value = model ? model.name : "";
      $("modelApiKey").value = model ? model.apiKey : "";
      $("modelBaseUrl").value = model ? model.baseUrl : "";
      $("modelCode").value = model ? model.model : "";
      $("modelApiType").value = model ? model.apiType : "openai-text";
      $("modelProvider").value = model ? model.provider || "custom" : "custom";
      $("modelThinkingMode").value = model ? model.thinkingMode || "default" : "default";
      $("modelCode").placeholder = (PROVIDER_PRESETS[$("modelProvider").value] || PROVIDER_PRESETS.custom).modelPlaceholder;
      $("deleteModelBtn").disabled = !model;
      $("modelTestResult").className = "model-test-result hidden";
      $("modelTestResult").textContent = "";
      renderModelList();
    }

    async function reloadBootstrap(preferredProjectId = state.projectId) {
      const data = await api("/api/bootstrap");
	      state.models = data.models;
	      state.projects = data.projects;
	      state.runSummaries = data.runSummaries;
	      state.workflows = data.workflows || [];
	      state.workflowRunSummaries = data.workflowRunSummaries || [];
	      state.projectId = state.projects.some((project) => project.id === preferredProjectId)
	        ? preferredProjectId
	        : state.projects[0].id;
      renderProjectSelect();
      renderDraft();
      renderHistory();
      renderModelList();
      renderResult();
    }

    async function createProject() {
      const name = await askForText({ title: "新建项目", label: "项目名称", value: "新项目", confirmText: "创建" });
      if (!name) return;
      const project = await api("/api/projects", { method: "POST", body: JSON.stringify({ name }) });
      await reloadBootstrap(project.id);
      showStatus("项目已创建。");
    }

    async function renameProject() {
      const project = currentProject();
      if (!project) return;
      const name = await askForText({ title: "重命名项目", label: "项目名称", value: project.name, confirmText: "保存" });
      if (!name || name === project.name) return;
      const updated = await api(`/api/projects/${project.id}`, { method: "PUT", body: JSON.stringify({ name }) });
      Object.assign(project, updated);
      renderProjectSelect();
      showStatus("项目已重命名。");
    }

    async function deleteProject() {
      const project = currentProject();
      if (!project || !await askToConfirm({
        title: "删除项目",
        message: `删除项目“${project.name}”及其历史？`,
        confirmText: "删除"
      })) return;
	      await api(`/api/projects/${project.id}`, { method: "DELETE" });
	      state.currentRun = null;
	      state.currentWorkflowRun = null;
	      state.workflowId = "";
	      await reloadBootstrap("");
	      showStatus("项目已删除。");
    }

    async function addPrompt() {
      const project = currentProject();
      const prompt = await api(`/api/projects/${project.id}/prompts`, {
        method: "POST",
        body: JSON.stringify({
          name: `V${project.promptVersions.length + 1}`,
          systemPrompt: "",
          userPrompt: "{{input}}"
        })
      });
      await reloadBootstrap(project.id);
      state.promptId = prompt.id;
      renderPromptVersions();
      showStatus("Prompt 版本已新增。");
    }

    async function savePrompt(event) {
      event.preventDefault();
      const project = currentProject();
      const updated = await api(`/api/projects/${project.id}/prompts/${state.promptId}`, {
        method: "PUT",
        body: JSON.stringify({
          name: $("promptName").value,
          systemPrompt: $("systemPrompt").value,
          userPrompt: $("userPrompt").value
        })
      });
      const prompt = project.promptVersions.find((item) => item.id === updated.id);
	      Object.assign(prompt, updated);
	      renderPromptVersions();
	      renderVariables();
	      renderWorkflows();
	      showStatus("Prompt 版本已保存。");
	    }

    async function deletePrompt() {
      const project = currentProject();
      const prompt = project.promptVersions.find((item) => item.id === state.promptId);
      if (!prompt || !await askToConfirm({
        title: "删除 Prompt 版本",
        message: `删除版本“${prompt.name}”？`,
        confirmText: "删除"
      })) return;
      await api(`/api/projects/${project.id}/prompts/${prompt.id}`, { method: "DELETE" });
      await reloadBootstrap(project.id);
      showStatus("Prompt 版本已删除。");
    }

    function variableNamesOnScreen() {
      return Array.from(document.querySelectorAll("[data-variable]")).map((input) => input.dataset.variable);
    }

    async function saveVariableSample() {
      const project = currentProject();
      const variableValues = readVariableValues();
      if (!Object.keys(variableValues).length) {
        showStatus("当前没有可保存的变量。", true);
        return;
      }
      const name = await askForText({ title: "保存变量样例", label: "样例名称", value: "样例", confirmText: "保存" });
      if (!name) return;
      const sample = await api(`/api/projects/${project.id}/variable-samples`, {
        method: "POST",
        body: JSON.stringify({ name, variableValues })
      });
      project.variableSamples.unshift(sample);
      renderVariableSamples();
      $("variableSampleSelect").value = sample.id;
      showStatus("变量样例已保存。");
    }

    async function loadVariableSample() {
      const project = currentProject();
      const sample = project.variableSamples.find((item) => item.id === $("variableSampleSelect").value);
      if (!sample) return;
      const hasValues = Array.from(document.querySelectorAll("[data-variable]")).some((input) => input.value);
      if (hasValues && !await askToConfirm({
        title: "载入变量样例",
        message: "将用样例值覆盖当前可匹配变量。",
        confirmText: "覆盖"
      })) return;

      let matched = 0;
      variableNamesOnScreen().forEach((name) => {
        if (!Object.prototype.hasOwnProperty.call(sample.variableValues, name)) return;
        const input = document.querySelector(`[data-variable="${CSS.escape(name)}"]`);
        if (!input) return;
        input.value = sample.variableValues[name];
        matched += 1;
      });
      scheduleDraftSave(false);
      showStatus(matched ? `已载入 ${matched} 个变量。` : "当前 Prompt 没有可匹配的样例变量。");
    }

    async function deleteVariableSample() {
      const project = currentProject();
      const sample = project.variableSamples.find((item) => item.id === $("variableSampleSelect").value);
      if (!sample || !await askToConfirm({
        title: "删除变量样例",
        message: `删除样例“${sample.name}”？`,
        confirmText: "删除"
      })) return;
      await api(`/api/projects/${project.id}/variable-samples/${sample.id}`, { method: "DELETE" });
      project.variableSamples = project.variableSamples.filter((item) => item.id !== sample.id);
      renderVariableSamples();
      showStatus("变量样例已删除。");
    }

    async function runExperiment() {
      const project = currentProject();
      const button = $("runBtn");
      const combinationCount = selectedPromptIds().length * selectedModelIds().length;
      button.disabled = true;
      button.textContent = "运行中";
      renderRunProgress(combinationCount);
      try {
        const run = await api("/api/runs", {
          method: "POST",
          body: JSON.stringify({
            projectId: project.id,
            promptVersionIds: selectedPromptIds(),
            modelConfigIds: selectedModelIds(),
            variableValues: readVariableValues()
          })
        });
        state.currentRun = run;
        await reloadBootstrap(project.id);
        state.currentRun = run;
        renderResult();
        showStatus("实验已完成并保存。");
      } catch (error) {
        renderResult();
        showStatus(error.message, true);
      } finally {
        button.disabled = false;
        button.textContent = "运行矩阵";
        $("matrixHost").removeAttribute("aria-busy");
      }
    }

	    async function openRun(runId) {
	      state.currentRun = await api(`/api/runs/${runId}`);
	      state.detailCellKey = "";
	      renderResult();
	      setHistory(false);
	    }

	    async function createWorkflow() {
	      const project = currentProject();
	      if (!project) return;
	      const name = await askForText({ title: "新建链路", label: "链路名称", value: "新链路", confirmText: "创建" });
	      if (!name) return;
	      const workflow = await api(`/api/projects/${project.id}/workflows`, {
	        method: "POST",
	        body: JSON.stringify({ name })
	      });
	      state.workflowId = workflow.id;
	      state.currentWorkflowRun = null;
	      await reloadBootstrap(project.id);
	      state.workflowId = workflow.id;
	      renderWorkflows();
	      showStatus("链路已创建。");
	    }

	    async function renameWorkflow() {
	      const workflow = currentWorkflow();
	      if (!workflow) return;
	      const name = await askForText({ title: "重命名链路", label: "链路名称", value: workflow.name, confirmText: "保存" });
	      if (!name || name === workflow.name) return;
	      const updated = await api(`/api/workflows/${workflow.id}`, {
	        method: "PUT",
	        body: JSON.stringify({ name })
	      });
	      Object.assign(workflow, updated);
	      renderWorkflows();
	      showStatus("链路已重命名。");
	    }

	    async function deleteWorkflow() {
	      const workflow = currentWorkflow();
	      if (!workflow || !await askToConfirm({
	        title: "删除链路",
	        message: `删除链路“${workflow.name}”及其运行历史？`,
	        confirmText: "删除"
	      })) return;
	      await api(`/api/workflows/${workflow.id}`, { method: "DELETE" });
	      state.workflowId = "";
	      state.currentWorkflowRun = null;
	      await reloadBootstrap(state.projectId);
	      showStatus("链路已删除。");
	    }

	    function workflowPayload(workflow) {
	      return {
	        name: workflow.name,
	        steps: workflow.steps.map((step) => ({
	          id: step.id,
	          name: step.name,
	          promptVersionId: step.promptVersionId,
	          modelConfigId: step.modelConfigId,
	          outputVariable: step.outputVariable,
	          stopOnError: step.stopOnError !== false
	        })),
	        draft: {
	          initialValues: readWorkflowInitialValues()
	        }
	      };
	    }

	    function scheduleWorkflowSave(refreshVariables = true) {
	      const workflow = currentWorkflow();
	      if (!workflow) return;
	      workflow.draft = { initialValues: readWorkflowInitialValues() };
	      if (refreshVariables) renderWorkflowInitialVariables();
	      clearTimeout(workflowSaveTimer);
	      workflowSaveTimer = setTimeout(async () => {
	        try {
	          const updated = await api(`/api/workflows/${workflow.id}`, {
	            method: "PUT",
	            body: JSON.stringify(workflowPayload(workflow))
	          });
	          Object.assign(workflow, updated);
	          renderWorkflowList();
	          renderWorkflowHistory();
	        } catch (error) {
	          showStatus(error.message, true);
	        }
	      }, 260);
	    }

	    function addWorkflowStep() {
	      const workflow = currentWorkflow();
	      if (!workflow) return;
	      const index = workflow.steps.length + 1;
	      workflow.steps.push({
	        id: `step_draft_${Date.now()}_${index}`,
	        name: `Step ${index}`,
	        promptVersionId: currentProject() && currentProject().promptVersions[0] ? currentProject().promptVersions[0].id : "",
	        modelConfigId: state.models[0] ? state.models[0].id : "",
	        outputVariable: `step_${index}_answer`,
	        stopOnError: true
	      });
	      renderWorkflowEditor();
	      renderWorkflowInitialVariables();
	      scheduleWorkflowSave(false);
	    }

	    function updateWorkflowStep(row, target, rerender = false) {
	      const workflow = currentWorkflow();
	      if (!workflow) return;
	      const index = Number(row.dataset.stepIndex);
	      const step = workflow.steps[index];
	      if (!step) return;
	      const field = target.dataset.stepField;
	      if (field === "stopOnError") {
	        step.stopOnError = target.checked;
	      } else if (field) {
	        step[field] = target.value;
	      }
	      if (rerender) renderWorkflowEditor();
	      renderWorkflowInitialVariables();
	      scheduleWorkflowSave(false);
	    }

	    function moveWorkflowStep(index, direction) {
	      const workflow = currentWorkflow();
	      if (!workflow) return;
	      const nextIndex = direction === "up" ? index - 1 : index + 1;
	      if (nextIndex < 0 || nextIndex >= workflow.steps.length) return;
	      const [step] = workflow.steps.splice(index, 1);
	      workflow.steps.splice(nextIndex, 0, step);
	      renderWorkflowEditor();
	      renderWorkflowInitialVariables();
	      scheduleWorkflowSave(false);
	    }

	    async function deleteWorkflowStep(index) {
	      const workflow = currentWorkflow();
	      if (!workflow) return;
	      workflow.steps.splice(index, 1);
	      renderWorkflowEditor();
	      renderWorkflowInitialVariables();
	      scheduleWorkflowSave(false);
	    }

	    async function runWorkflow() {
	      const workflow = currentWorkflow();
	      const project = currentProject();
	      if (!workflow || !project) return;
	      const button = $("runWorkflowBtn");
	      button.disabled = true;
	      button.textContent = "运行中";
	      $("workflowResultHost").setAttribute("aria-busy", "true");
	      $("workflowResultHost").innerHTML = `
	        <div class="run-progress">
	          <strong>正在运行链路</strong>
	          <div class="muted">会按 Step 顺序执行，并保存每一步的上下文快照。</div>
	          <div class="run-progress-bar" aria-hidden="true"></div>
	        </div>
	      `;
	      try {
	        await api(`/api/workflows/${workflow.id}`, {
	          method: "PUT",
	          body: JSON.stringify(workflowPayload(workflow))
	        });
	        const run = await api("/api/workflow-runs", {
	          method: "POST",
	          body: JSON.stringify({
	            projectId: project.id,
	            workflowId: workflow.id,
	            initialValues: readWorkflowInitialValues()
	          })
	        });
	        state.currentWorkflowRun = run;
	        state.workflowTraceIndex = 0;
	        await reloadBootstrap(project.id);
	        state.workflowId = workflow.id;
	        state.currentWorkflowRun = run;
	        renderWorkflows();
	        showStatus("链路运行已完成并保存。");
	      } catch (error) {
	        renderWorkflows();
	        showStatus(error.message, true);
	      } finally {
	        button.disabled = false;
	        button.textContent = "运行链路";
	        $("workflowResultHost").removeAttribute("aria-busy");
	      }
	    }

	    async function openWorkflowRun(runId) {
	      state.currentWorkflowRun = await api(`/api/workflow-runs/${runId}`);
	      state.workflowId = state.currentWorkflowRun.workflowId;
	      state.workflowTraceIndex = 0;
	      renderWorkflows();
	    }

	    function setHistory(open) {
      $("historyDrawer").classList.toggle("hidden", !open);
      $("historyBackdrop").classList.toggle("hidden", !open);
      $("historyDrawer").setAttribute("aria-hidden", open ? "false" : "true");
      if (open) renderHistory();
    }

    async function saveModel(event) {
      event.preventDefault();
      const payload = {
        name: $("modelName").value,
        apiKey: $("modelApiKey").value,
        baseUrl: $("modelBaseUrl").value,
        model: $("modelCode").value,
        apiType: $("modelApiType").value,
        provider: $("modelProvider").value,
        thinkingMode: $("modelThinkingMode").value
      };
      const saved = await api(state.modelId ? `/api/models/${state.modelId}` : "/api/models", {
        method: state.modelId ? "PUT" : "POST",
        body: JSON.stringify(payload)
      });
      await reloadBootstrap(state.projectId);
      fillModelForm(state.models.find((model) => model.id === saved.id));
      showStatus("模型配置已保存。");
    }

    async function deleteModel() {
      const model = state.models.find((item) => item.id === state.modelId);
      if (!model || !await askToConfirm({
        title: "删除模型配置",
        message: `删除模型“${model.name}”？`,
        confirmText: "删除"
      })) return;
      await api(`/api/models/${model.id}`, { method: "DELETE" });
      await reloadBootstrap(state.projectId);
      fillModelForm();
      showStatus("模型配置已删除。");
    }

    function renderModelTestResult(result) {
      const target = $("modelTestResult");
      const ok = result.status === "success";
      target.className = `model-test-result ${ok ? "ok" : "bad"}`;
      target.innerHTML = ok
        ? `测试成功 · ${Math.round(result.elapsedMs || 0)} ms${result.answer ? `<br>${escapeHtml(result.answer)}` : ""}`
        : `测试失败${result.httpStatus ? ` · HTTP ${escapeHtml(result.httpStatus)}` : ""}<br>${escapeHtml(result.error || "请求失败。")}`;
    }

    async function testModelConfig() {
      const button = $("testModelBtn");
      button.disabled = true;
      try {
        renderModelTestResult(await api("/api/models/test", {
          method: "POST",
          body: JSON.stringify({
            name: $("modelName").value || "待测试模型",
            apiKey: $("modelApiKey").value,
            baseUrl: $("modelBaseUrl").value,
            model: $("modelCode").value,
            apiType: $("modelApiType").value,
            provider: $("modelProvider").value,
            thinkingMode: $("modelThinkingMode").value
          })
        }));
      } catch (error) {
        renderModelTestResult({ status: "error", error: error.message });
      } finally {
        button.disabled = false;
      }
    }

	    function switchView(view) {
	      $("labView").classList.toggle("hidden", view !== "lab");
	      $("workflowView").classList.toggle("hidden", view !== "workflow");
	      $("modelsView").classList.toggle("hidden", view !== "models");
	      $("labViewBtn").classList.toggle("active", view === "lab");
	      $("workflowViewBtn").classList.toggle("active", view === "workflow");
	      $("modelsViewBtn").classList.toggle("active", view === "models");
	    }

    $("projectSelect").addEventListener("change", () => {
	      state.projectId = $("projectSelect").value;
	      state.currentRun = null;
	      state.currentWorkflowRun = null;
	      state.workflowId = "";
	      renderDraft();
	      renderHistory();
	      renderResult();
    });
    $("createProjectBtn").addEventListener("click", () => createProject().catch((error) => showStatus(error.message, true)));
    $("renameProjectBtn").addEventListener("click", () => renameProject().catch((error) => showStatus(error.message, true)));
    $("deleteProjectBtn").addEventListener("click", () => deleteProject().catch((error) => showStatus(error.message, true)));
    $("addPromptBtn").addEventListener("click", () => addPrompt().catch((error) => showStatus(error.message, true)));
    $("promptForm").addEventListener("submit", (event) => savePrompt(event).catch((error) => showStatus(error.message, true)));
    $("deletePromptBtn").addEventListener("click", () => deletePrompt().catch((error) => showStatus(error.message, true)));
    $("promptVersionList").addEventListener("click", (event) => {
      const button = event.target.closest("[data-edit-prompt]");
      if (!button) return;
      state.promptId = button.dataset.editPrompt;
      renderPromptVersions();
    });
    $("promptSelectList").addEventListener("change", (event) => {
      if (!event.target.matches("[data-select-prompt]")) return;
      scheduleDraftSave();
    });
    $("modelSelectList").addEventListener("change", () => scheduleDraftSave(false));
    $("variableList").addEventListener("input", () => scheduleDraftSave(false));
    $("recognizeVariablesBtn").addEventListener("click", () => {
      const project = currentProject();
      if (!project) return;
      project.draft.variableValues = { ...project.draft.variableValues, ...readVariableValues() };
      renderVariables();
      const count = document.querySelectorAll("[data-variable]").length;
      showStatus(count ? `已识别 ${count} 个变量。` : "已选 Prompt 中没有识别到变量。");
    });
    $("applyBatchBtn").addEventListener("click", () => {
      const names = variableNamesOnScreen();
      const values = parseBatch($("batchVariables").value, names);
      Object.entries(values).forEach(([name, value]) => {
        const input = document.querySelector(`[data-variable="${CSS.escape(name)}"]`);
        if (input) input.value = value;
      });
      scheduleDraftSave();
    });
    $("saveVariableSampleBtn").addEventListener("click", () => saveVariableSample().catch((error) => showStatus(error.message, true)));
    $("loadVariableSampleBtn").addEventListener("click", () => loadVariableSample().catch((error) => showStatus(error.message, true)));
    $("deleteVariableSampleBtn").addEventListener("click", () => deleteVariableSample().catch((error) => showStatus(error.message, true)));
    $("runBtn").addEventListener("click", runExperiment);
    $("rawModeBtn").addEventListener("click", () => { state.markdownMode = "raw"; renderResult(); });
    $("renderModeBtn").addEventListener("click", () => { state.markdownMode = "render"; renderResult(); });
    $("matrixViewBtn").addEventListener("click", () => { state.resultView = "matrix"; renderResult(); });
    $("compareViewBtn").addEventListener("click", () => { state.resultView = "compare"; renderResult(); });
    $("comparePromptSelect").addEventListener("change", () => {
      state.comparePromptId = $("comparePromptSelect").value;
      renderResult();
    });
    $("matrixHost").addEventListener("click", (event) => {
      const target = event.target.closest("[data-open-cell]");
      if (target) setDetail(true, target.dataset.openCell);
    });
    $("historyBtn").addEventListener("click", () => setHistory(true));
    $("closeHistoryBtn").addEventListener("click", () => setHistory(false));
    $("historyBackdrop").addEventListener("click", () => setHistory(false));
	    $("historyList").addEventListener("click", (event) => {
	      const item = event.target.closest("[data-run-id]");
	      if (item) openRun(item.dataset.runId).catch((error) => showStatus(error.message, true));
	    });
	    $("labViewBtn").addEventListener("click", () => switchView("lab"));
	    $("workflowViewBtn").addEventListener("click", () => switchView("workflow"));
	    $("modelsViewBtn").addEventListener("click", () => switchView("models"));
	    $("createWorkflowBtn").addEventListener("click", () => createWorkflow().catch((error) => showStatus(error.message, true)));
	    $("renameWorkflowBtn").addEventListener("click", () => renameWorkflow().catch((error) => showStatus(error.message, true)));
	    $("deleteWorkflowBtn").addEventListener("click", () => deleteWorkflow().catch((error) => showStatus(error.message, true)));
	    $("workflowList").addEventListener("click", (event) => {
	      const row = event.target.closest("[data-select-workflow]");
	      if (!row) return;
	      state.workflowId = row.dataset.selectWorkflow;
	      state.currentWorkflowRun = null;
	      renderWorkflows();
	    });
	    $("addWorkflowStepBtn").addEventListener("click", addWorkflowStep);
	    $("workflowStepList").addEventListener("input", (event) => {
	      const target = event.target.closest("[data-step-field]");
	      const row = event.target.closest("[data-step-index]");
	      if (target && row) updateWorkflowStep(row, target, false);
	    });
	    $("workflowStepList").addEventListener("change", (event) => {
	      const target = event.target.closest("[data-step-field]");
	      const row = event.target.closest("[data-step-index]");
	      if (target && row) updateWorkflowStep(row, target, true);
	    });
	    $("workflowStepList").addEventListener("click", (event) => {
	      const button = event.target.closest("[data-step-action]");
	      const row = event.target.closest("[data-step-index]");
	      if (!button || !row) return;
	      const index = Number(row.dataset.stepIndex);
	      if (button.dataset.stepAction === "delete") {
	        deleteWorkflowStep(index).catch((error) => showStatus(error.message, true));
	      } else {
	        moveWorkflowStep(index, button.dataset.stepAction);
	      }
	    });
	    $("workflowInitialList").addEventListener("input", () => scheduleWorkflowSave(false));
	    $("recognizeWorkflowVariablesBtn").addEventListener("click", () => {
	      renderWorkflowInitialVariables();
	      const count = document.querySelectorAll("[data-workflow-variable]").length;
	      showStatus(count ? `已识别 ${count} 个初始变量。` : "当前链路没有需要填写的初始变量。");
	    });
	    $("applyWorkflowBatchBtn").addEventListener("click", () => {
	      const names = Array.from(document.querySelectorAll("[data-workflow-variable]")).map((input) => input.dataset.workflowVariable);
	      const values = parseBatch($("workflowBatchVariables").value, names);
	      Object.entries(values).forEach(([name, value]) => {
	        const input = document.querySelector(`[data-workflow-variable="${CSS.escape(name)}"]`);
	        if (input) input.value = value;
	      });
	      scheduleWorkflowSave(false);
	    });
	    $("runWorkflowBtn").addEventListener("click", () => runWorkflow().catch((error) => showStatus(error.message, true)));
	    $("workflowResultHost").addEventListener("click", (event) => {
	      const row = event.target.closest("[data-trace-index]");
	      if (!row) return;
	      state.workflowTraceIndex = Number(row.dataset.traceIndex);
	      renderWorkflowRun();
	    });
	    $("workflowHistoryList").addEventListener("click", (event) => {
	      const row = event.target.closest("[data-workflow-run-id]");
	      if (row) openWorkflowRun(row.dataset.workflowRunId).catch((error) => showStatus(error.message, true));
	    });
	    $("newModelBtn").addEventListener("click", () => fillModelForm());
    $("modelList").addEventListener("click", (event) => {
      const row = event.target.closest("[data-edit-model]");
      if (!row) return;
      fillModelForm(state.models.find((model) => model.id === row.dataset.editModel));
    });
    $("modelProvider").addEventListener("change", () => applyProviderPreset($("modelProvider").value));
    $("modelForm").addEventListener("submit", (event) => saveModel(event).catch((error) => showStatus(error.message, true)));
    $("testModelBtn").addEventListener("click", () => testModelConfig().catch((error) => showStatus(error.message, true)));
    $("deleteModelBtn").addEventListener("click", () => deleteModel().catch((error) => showStatus(error.message, true)));
    $("closeDetailBtn").addEventListener("click", () => setDetail(false));
    $("detailBackdrop").addEventListener("click", () => setDetail(false));
    $("modalCancelBtn").addEventListener("click", () => finishModal(modalState && modalState.mode === "confirm" ? false : null));
    $("modalBackdrop").addEventListener("click", () => finishModal(modalState && modalState.mode === "confirm" ? false : null));
    $("modalForm").addEventListener("submit", (event) => {
      event.preventDefault();
      if (!modalState) return;
      if (modalState.mode === "confirm") {
        finishModal(true);
        return;
      }
      const value = $("modalInput").value.trim();
      if (!value) {
        showStatus("请先填写名称。", true);
        $("modalInput").focus();
        return;
      }
      finishModal(value);
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modalState) {
        finishModal(modalState.mode === "confirm" ? false : null);
        return;
      }
      if (event.key === "Escape" && state.detailCellKey) setDetail(false);
    });

    renderProviderOptions();
    reloadBootstrap().then(() => fillModelForm()).catch((error) => showStatus(error.message, true));
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prompt 实验台</title>
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png?v=prompt-lab-20260521" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png?v=prompt-lab-20260521" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f0e8;
      --panel: #fffdf9;
      --surface: #ffffff;
      --ink: #151716;
      --muted: #63675f;
      --line: #d7d0c1;
      --line-soft: #e8e1d4;
      --accent: #b63f2a;
      --accent-dark: #8f2f1f;
      --green: #176646;
      --green-soft: #e7f1e8;
      --blue: #235d88;
      --blue-soft: #eaf2f7;
      --danger: #a12d2d;
      --danger-soft: #faecea;
      --code: #121824;
      --shadow: rgba(21, 23, 22, .12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, textarea, select { font: inherit; }
    button {
      border: 1px solid var(--ink);
      background: var(--surface);
      color: var(--ink);
      min-height: 36px;
      padding: 7px 11px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }
    button:hover { background: var(--ink); color: var(--surface); }
    button:disabled { cursor: wait; opacity: .56; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
    button.quiet { border-color: var(--line); color: var(--muted); }
    button.danger { border-color: var(--danger); color: var(--danger); }
    button.danger:hover { background: var(--danger); color: #fff; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
      line-height: 1.45;
    }
    textarea { resize: vertical; min-height: 92px; }
    input:focus, textarea:focus, select:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
    label { display: block; color: var(--muted); font-size: 12px; font-weight: 700; margin: 10px 0 5px; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: 20px; margin-bottom: 0; }
    h2 { font-size: 16px; margin-bottom: 0; }
    h3 { font-size: 14px; margin-bottom: 0; }
    pre {
      background: var(--code);
      color: #e9eef8;
      margin: 0;
      padding: 11px;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
      max-height: 300px;
      line-height: 1.55;
      font-size: 12px;
    }
    code {
      background: rgba(18, 24, 36, .08);
      padding: 1px 4px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }
    .shell { min-height: 100vh; display: grid; grid-template-rows: auto minmax(0, 1fr); }
    .topbar {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: grid;
      grid-template-columns: auto minmax(260px, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 12px 14px;
    }
    .brand { display: grid; gap: 2px; }
    .brand span { color: var(--muted); font-size: 12px; }
    .project-bar, .button-row, .view-switch, .toggle-row {
      display: flex;
      gap: 7px;
      align-items: center;
      flex-wrap: wrap;
    }
    .project-bar select { width: min(340px, 100%); }
    .view-switch button.active, .toggle-row button.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--surface);
    }
    .page { min-height: 0; padding: 10px; }
    .hidden { display: none !important; }
    .lab-grid {
      display: grid;
      grid-template-columns: minmax(320px, 360px) minmax(300px, 340px) minmax(540px, 1fr);
      gap: 10px;
      align-items: start;
    }
    .panel {
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 12px;
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .stack { display: grid; gap: 9px; }
    .version-list, .check-list, .history-list, .model-list { display: grid; gap: 7px; align-content: start; grid-auto-rows: max-content; }
    .version-row, .check-row, .history-item, .model-row {
      min-width: 0;
      border: 1px solid var(--line-soft);
      background: var(--surface);
      padding: 8px;
    }
    .version-row { display: block; }
    .version-row.active { border-color: var(--accent); }
    .version-pick {
      min-width: 0;
      text-align: left;
      min-height: 0;
      border: 0;
      padding: 0;
      background: transparent;
    }
    .version-pick:hover { color: var(--accent); background: transparent; }
    .version-pick strong, .check-row strong, .model-row strong, .history-item strong { display: block; overflow-wrap: anywhere; }
    .check-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      line-height: 1.4;
    }
    .check-row input { width: 16px; height: 16px; margin: 0; }
    .check-row small, .version-row small, .history-item small, .model-row small {
      display: block;
      overflow-wrap: anywhere;
    }
    .check-row small, .version-row small, .history-item small, .model-row small, .empty, .muted { color: var(--muted); }
    .prompt-section {
      border: 1px solid var(--line-soft);
      background: var(--surface);
      padding: 10px;
    }
    .prompt-section + .prompt-section { margin-top: 11px; }
    .prompt-section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .prompt-section.editing { background: #fbf7ee; }
    .prompt-editor textarea { min-height: 150px; }
    .variable-grid { display: grid; gap: 8px; }
    .variable-tools { display: grid; gap: 8px; }
    .sample-row { display: grid; grid-template-columns: minmax(0, 1fr) auto auto auto; gap: 7px; align-items: center; }
    .variable-row { display: grid; grid-template-columns: minmax(120px, 170px) 1fr; gap: 8px; align-items: start; }
    .variable-label { display: grid; gap: 4px; }
    .variable-row strong {
      overflow-wrap: anywhere;
      color: var(--accent);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }
    .variable-row small { color: var(--muted); line-height: 1.45; }
    .result-panel { display: grid; gap: 9px; }
    .result-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 9px;
      flex-wrap: wrap;
    }
    .run-meta { color: var(--muted); font-size: 12px; line-height: 1.5; }
    .result-actions { display: grid; justify-items: end; gap: 7px; }
    .compare-select { width: min(280px, 100%); }
    .matrix-wrap { min-width: 0; overflow-x: auto; overflow-y: visible; border: 1px solid var(--line); background: var(--surface); }
    .matrix {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .matrix .prompt-col { width: 150px; }
    .matrix .model-col { width: 390px; }
    .matrix th, .matrix td {
      border: 1px solid var(--line-soft);
      vertical-align: top;
      padding: 9px;
    }
    .matrix th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f8f4eb;
      text-align: left;
      overflow-wrap: anywhere;
    }
    .matrix th:first-child { left: 0; z-index: 2; }
    .matrix td:first-child {
      position: sticky;
      left: 0;
      z-index: 1;
      background: #fcf8f0;
      font-weight: 700;
    }
    .cell { display: grid; gap: 8px; min-height: 262px; }
    .cell:hover { border-color: var(--accent); }
    .cell-read { justify-self: start; }
    .cell-meta { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border: 1px solid var(--line);
      padding: 2px 6px;
      background: #f8f4eb;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .pill.ok { color: var(--green); border-color: #b9d7c1; background: var(--green-soft); }
    .pill.bad { color: var(--danger); border-color: #e5beb8; background: var(--danger-soft); }
    .answer {
      border: 1px solid var(--line-soft);
      background: #fffdf7;
      min-height: 160px;
      max-height: 250px;
      overflow: auto;
      padding: 9px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.65;
    }
    .answer.preview { max-height: 360px; overflow: hidden; }
    .answer.rendered { white-space: normal; }
    .answer.rendered > :last-child { margin-bottom: 0; }
    .answer.rendered h1, .answer.rendered h2, .answer.rendered h3 { margin: 0 0 7px; }
    .answer.rendered p, .answer.rendered ul, .answer.rendered ol, .answer.rendered blockquote { margin: 0 0 8px; }
    .answer.rendered ul, .answer.rendered ol { padding-left: 20px; }
    .answer.rendered blockquote { border-left: 3px solid var(--line); padding-left: 9px; color: var(--muted); }
    .answer.rendered pre { max-height: none; }
    .answer.detail-answer {
      max-height: none !important;
      min-height: auto;
      height: auto;
      overflow: visible !important;
    }
    .answer.compare-answer { max-height: none; min-height: 220px; overflow: visible; }
    .compare-strip {
      min-height: 100%;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(340px, 1fr);
      gap: 10px;
      overflow: auto;
      padding: 10px;
    }
    .compare-card {
      min-width: 0;
      border: 1px solid var(--line-soft);
      background: #fcf8f0;
      padding: 10px;
      display: grid;
      gap: 8px;
      align-content: start;
    }
    .compare-card .panel-head { margin-bottom: 0; align-items: flex-start; }
    details {
      border: 1px solid var(--line-soft);
      background: var(--surface);
      padding: 8px;
    }
    summary { cursor: pointer; color: var(--muted); font-weight: 700; }
    .detail-grid { display: grid; gap: 8px; margin-top: 8px; }
    .detail-block { display: grid; gap: 5px; }
    .detail-block strong { font-size: 12px; color: var(--muted); }
    .history-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(21, 23, 22, .26);
      z-index: 10;
    }
    .history-drawer {
      position: fixed;
      z-index: 11;
      top: 0;
      right: 0;
      width: min(430px, 94vw);
      height: 100vh;
      border-left: 1px solid var(--line);
      background: var(--panel);
      box-shadow: -10px 0 28px var(--shadow);
      padding: 12px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
    }
    .detail-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(21, 23, 22, .26);
      z-index: 12;
    }
    .detail-drawer {
      position: fixed;
      z-index: 13;
      top: 0;
      right: 0;
      width: min(860px, 96vw);
      height: 100vh;
      border-left: 1px solid var(--line);
      background: var(--panel);
      box-shadow: -10px 0 28px var(--shadow);
      padding: 12px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
    }
    .detail-body { min-height: 0; overflow: auto; display: grid; gap: 10px; align-content: start; }
    body.detail-open { overflow: hidden; }
    .detail-body pre { max-height: none; }
    .history-item { align-self: start; text-align: left; cursor: pointer; }
    .history-item:hover, .model-row.active { border-color: var(--accent); }
	    .workflow-grid {
	      height: 100%;
	      min-height: 0;
	      display: grid;
	      grid-template-columns: minmax(260px, 320px) minmax(360px, 460px) minmax(420px, 1fr);
	      gap: 10px;
	      align-items: start;
	    }
	    .workflow-row, .step-row, .trace-row {
	      border: 1px solid var(--line-soft);
	      background: var(--surface);
	      padding: 8px;
	    }
	    .workflow-row, .trace-row { cursor: pointer; text-align: left; }
	    .workflow-row.active, .step-row.active, .trace-row.active { border-color: var(--accent); background: #fbf7ee; }
	    .step-row { display: grid; gap: 8px; }
	    .step-head {
	      display: flex;
	      justify-content: space-between;
	      align-items: center;
	      gap: 8px;
	    }
	    .step-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
	    .step-actions { display: flex; flex-wrap: wrap; gap: 6px; }
	    .inline-check {
	      display: inline-grid;
	      grid-template-columns: auto 1fr;
	      gap: 6px;
	      align-items: center;
	      margin: 0;
	      color: var(--muted);
	    }
	    .inline-check input { width: 16px; height: 16px; margin: 0; }
	    .workflow-run-grid {
	      display: grid;
	      grid-template-columns: minmax(180px, 240px) minmax(0, 1fr);
	      gap: 10px;
	      align-items: start;
	    }
	    .trace-list { display: grid; gap: 7px; }
	    .context-grid { display: grid; gap: 8px; margin-top: 10px; }
	    .context-kv {
	      display: grid;
	      grid-template-columns: minmax(110px, 170px) minmax(0, 1fr);
	      gap: 8px;
	      border: 1px solid var(--line-soft);
	      background: #fffdf7;
	      padding: 7px;
	    }
	    .context-kv strong { overflow-wrap: anywhere; color: var(--accent); font-size: 12px; }
	    .context-kv span { white-space: pre-wrap; overflow-wrap: anywhere; }
	    .models-grid {
	      height: 100%;
	      min-height: 0;
	      display: grid;
      grid-template-columns: minmax(260px, 340px) minmax(320px, 520px);
      gap: 10px;
    }
    .model-row { cursor: pointer; text-align: left; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .model-test-result {
      border: 1px solid var(--line-soft);
      background: #fbf7ee;
      padding: 9px;
      color: var(--muted);
      line-height: 1.55;
      margin-top: 8px;
    }
    .model-test-result.ok { border-color: #b9d7c1; background: var(--green-soft); color: var(--green); }
    .model-test-result.bad { border-color: #e5beb8; background: var(--danger-soft); color: var(--danger); }
    .run-progress {
      min-height: 240px;
      display: grid;
      align-content: center;
      gap: 8px;
      padding: 18px;
      background: #fcf8f0;
    }
    .run-progress strong { font-size: 16px; }
    .run-progress-bar {
      height: 7px;
      background: var(--line-soft);
      overflow: hidden;
    }
    .run-progress-bar::after {
      content: "";
      display: block;
      width: 38%;
      height: 100%;
      background: var(--accent);
      animation: progress-sweep 1.1s ease-in-out infinite alternate;
    }
    @keyframes progress-sweep {
      from { transform: translateX(-85%); }
      to { transform: translateX(260%); }
    }
    .status {
      position: fixed;
      left: 50%;
      bottom: 16px;
      z-index: 20;
      transform: translateX(-50%);
      max-width: min(680px, calc(100vw - 24px));
      border: 1px solid var(--ink);
      background: var(--ink);
      color: #fff;
      padding: 9px 12px;
      box-shadow: 0 10px 30px var(--shadow);
      line-height: 1.45;
    }
    .status.error { border-color: var(--danger); background: var(--danger); }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(21, 23, 22, .34);
    }
    .app-modal {
      position: fixed;
      z-index: 31;
      top: 50%;
      left: 50%;
      width: min(420px, calc(100vw - 24px));
      transform: translate(-50%, -50%);
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 18px 44px var(--shadow);
      padding: 14px;
    }
    .app-modal p {
      color: var(--muted);
      line-height: 1.55;
      margin: 8px 0 0;
    }
    .app-modal .button-row { justify-content: flex-end; margin-top: 14px; }
    @media (max-width: 1180px) {
      .lab-grid { grid-template-columns: 1fr 1fr; height: auto; }
      .result-panel { grid-column: 1 / -1; min-height: 640px; }
      .shell { height: auto; min-height: 100vh; }
    }
    @media (max-width: 760px) {
	      .topbar, .lab-grid, .workflow-grid, .workflow-run-grid, .models-grid, .form-grid, .step-fields { grid-template-columns: 1fr; }
      .page { padding: 8px; }
      .result-panel { min-height: 560px; }
      .matrix .prompt-col { width: 120px; }
      .matrix .model-col { width: 320px; }
      .variable-row, .sample-row { grid-template-columns: 1fr; }
      .result-actions { justify-items: stretch; }
      .compare-strip { grid-auto-columns: minmax(280px, 86vw); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>Prompt 实验台</h1>
        <span id="dataState">本机保存</span>
      </div>
      <div class="project-bar">
        <select id="projectSelect" aria-label="切换项目"></select>
        <button id="createProjectBtn">新建项目</button>
        <button id="renameProjectBtn" class="quiet">重命名</button>
        <button id="deleteProjectBtn" class="danger">删除</button>
      </div>
	      <nav class="view-switch">
	        <button id="labViewBtn" class="active">实验</button>
	        <button id="workflowViewBtn">链路实验</button>
	        <button id="modelsViewBtn">模型配置</button>
	      </nav>
    </header>

    <main id="labView" class="page">
      <div class="lab-grid">
        <section class="panel">
          <div class="panel-head">
            <h2>Prompt 版本</h2>
            <button id="addPromptBtn" class="primary">新增</button>
          </div>
          <div class="prompt-section">
            <div class="prompt-section-head">
              <h3>切换版本</h3>
            </div>
            <div id="promptVersionList" class="version-list"></div>
          </div>
          <div class="prompt-section editing">
            <div class="prompt-section-head">
              <h3>编辑当前版本</h3>
            </div>
            <form id="promptForm" class="prompt-editor">
              <label for="promptName">版本名</label>
              <input id="promptName" />
              <label for="systemPrompt">System Prompt</label>
              <textarea id="systemPrompt"></textarea>
              <label for="userPrompt">User Prompt</label>
              <textarea id="userPrompt"></textarea>
              <div class="button-row">
                <button id="savePromptBtn" class="primary" type="submit">保存版本</button>
                <button id="deletePromptBtn" class="danger" type="button">删除版本</button>
              </div>
            </form>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>本次实验</h2>
            <button id="runBtn" class="primary">运行矩阵</button>
          </div>
          <div class="stack">
            <div>
              <h3>选择 Prompt</h3>
              <div id="promptSelectList" class="check-list"></div>
            </div>
            <div>
              <h3>选择模型</h3>
              <div id="modelSelectList" class="check-list"></div>
            </div>
            <div>
              <div class="panel-head">
                <h3>变量</h3>
                <div class="button-row">
                  <button id="recognizeVariablesBtn" class="quiet" type="button">识别变量</button>
                  <button id="applyBatchBtn" class="quiet" type="button">批量填入</button>
                </div>
              </div>
              <p class="muted">从已选 Prompt 的 System Prompt 和 User Prompt 中识别 {{变量名}}。</p>
              <div class="variable-tools">
                <div class="sample-row">
                  <select id="variableSampleSelect" aria-label="变量样例"></select>
                  <button id="saveVariableSampleBtn" class="quiet" type="button">保存样例</button>
                  <button id="loadVariableSampleBtn" class="quiet" type="button">载入覆盖</button>
                  <button id="deleteVariableSampleBtn" class="danger" type="button">删除样例</button>
                </div>
                <textarea id="batchVariables" placeholder="tone: 简洁&#10;audience=产品经理&#10;{{input}} 需要处理的正文"></textarea>
              </div>
              <div id="variableList" class="variable-grid"></div>
            </div>
          </div>
        </section>

        <section class="panel result-panel">
          <div class="result-toolbar">
            <div>
              <div class="panel-head">
                <h2>结果矩阵</h2>
                <button id="historyBtn" class="quiet">历史</button>
              </div>
              <div id="runMeta" class="run-meta">还没有运行记录。</div>
            </div>
            <div class="result-actions">
              <div class="toggle-row" aria-label="Markdown 视图">
                <button id="rawModeBtn" class="active">原文</button>
                <button id="renderModeBtn">渲染</button>
              </div>
              <div class="toggle-row" aria-label="结果布局">
                <button id="matrixViewBtn" class="active">矩阵</button>
                <button id="compareViewBtn">横向对比</button>
              </div>
              <select id="comparePromptSelect" class="compare-select hidden" aria-label="选择对比 Prompt"></select>
            </div>
          </div>
          <div id="matrixHost" class="matrix-wrap"></div>
        </section>
      </div>
	    </main>
	
	    <main id="workflowView" class="page hidden">
	      <div class="workflow-grid">
	        <section class="panel">
	          <div class="panel-head">
	            <h2>链路</h2>
	            <button id="createWorkflowBtn" class="primary">新增</button>
	          </div>
	          <div class="button-row">
	            <button id="renameWorkflowBtn" class="quiet" type="button">重命名</button>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = {
	      models: [],
	      projects: [],
	      runSummaries: [],
	      workflows: [],
	      workflowRunSummaries: [],
	      projectId: "",
	      promptId: "",
	      workflowId: "",

	      workflowTraceIndex: 0,
	      currentRun: null,

      resultView: "matrix",
      comparePromptId: "",

      modelId: ""
	    };
    const PROVIDER_PRESETS = {
      custom: { label: "自定义", baseUrl: "", apiType: "openai-text", modelPlaceholder: "model-name" },
      openai: { label: "OpenAI", baseUrl: "https://api.openai.com/v1", apiType: "openai-text", modelPlaceholder: "gpt-4.1-mini" },
      deepseek: { label: "DeepSeek", baseUrl: "https://api.deepseek.com", apiType: "openai-text", modelPlaceholder: "deepseek-chat" },
      "volcengine-ark": { label: "豆包 / 火山方舟", baseUrl: "https://ark.cn-beijing.volces.com/api/v3", apiType: "openai-text", modelPlaceholder: "doubao-seed-2-0-lite-260428" },
      "aliyun-bailian": { label: "通义百炼", baseUrl: "https://dashscope.aliyuncs.com/compatible-mode/v1", apiType: "openai-text", modelPlaceholder: "qwen-plus" },
      zhipu: { label: "智谱", baseUrl: "https://open.bigmodel.cn/api/paas/v4", apiType: "openai-text", modelPlaceholder: "glm-4-flash" },
      moonshot: { label: "Kimi", baseUrl: "https://api.moonshot.cn/v1", apiType: "openai-text", modelPlaceholder: "kimi-k2-0905-preview" },
      minimax: { label: "MiniMax", baseUrl: "https://api.minimaxi.com/v1", apiType: "openai-text", modelPlaceholder: "MiniMax-M2" },
      siliconflow: { label: "SiliconFlow", baseUrl: "https://api.siliconflow.cn/v1", apiType: "openai-text", modelPlaceholder: "Qwen/Qwen3-8B" }
    };
	    let draftTimer = null;
	    let workflowSaveTimer = null;
	    let modalState = null;

    async function api(url, options = {}) {
      const response = await fetch(url, {
        ...options,
        headers: { "Content-Type": "application/json", ...(options.headers || {}) }
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || "请求失败。");
      return data;
    }

    function showStatus(message, error = false) {
      $("status").textContent = message;
      $("status").className = "status" + (error ? " error" : "");
      clearTimeout(showStatus.timer);
      showStatus.timer = setTimeout(() => $("status").className = "status hidden", 2600);
    }

    function setModal(open) {
      $("appModal").classList.toggle("hidden", !open);
      $("modalBackdrop").classList.toggle("hidden", !open);
    }

    function finishModal(value) {
      if (!modalState) return;
      const resolve = modalState.resolve;
      modalState = null;
      setModal(false);
      resolve(value);
    }

    function askForText({ title, message = "", label = "名称", value = "", confirmText = "确定" }) {
      if (modalState) finishModal(null);
      $("modalTitle").textContent = title;
      $("modalMessage").textContent = message;
      $("modalMessage").classList.toggle("hidden", !message);
      $("modalField").classList.remove("hidden");
      $("modalLabel").textContent = label;
      $("modalInput").value = value;
      $("modalConfirmBtn").textContent = confirmText;
      setModal(true);
      setTimeout(() => {
        $("modalInput").focus();
        $("modalInput").select();
      }, 0);
      return new Promise((resolve) => {
        modalState = { mode: "text", resolve };
      });
    }

    function askToConfirm({ title, message, confirmText = "确定" }) {
      if (modalState) finishModal(false);
      $("modalTitle").textContent = title;
      $("modalMessage").textContent = message;
      $("modalMessage").classList.remove("hidden");
      $("modalField").classList.add("hidden");
      $("modalConfirmBtn").textContent = confirmText;
      setModal(true);
      setTimeout(() => $("modalConfirmBtn").focus(), 0);
      return new Promise((resolve) => {
        modalState = { mode: "confirm", resolve };
      });
    }

	    function currentProject() {
	      return state.projects.find((project) => project.id === state.projectId);
	    }

	    function projectWorkflows() {
	      return state.workflows.filter((workflow) => workflow.projectId === state.projectId);
	    }

	    function currentWorkflow() {
	      return state.workflows.find((workflow) => workflow.id === state.workflowId && workflow.projectId === state.projectId);
	    }

	    function promptById(promptId) {
	      const project = currentProject();
	      return project && project.promptVersions.find((prompt) => prompt.id === promptId);
	    }

	    function modelById(modelId) {
	      return state.models.find((model) => model.id === modelId);
	    }

    function selectedPromptIds() {
      return Array.from(document.querySelectorAll("[data-select-prompt]:checked")).map((input) => input.value);
    }

    function selectedModelIds() {
      return Array.from(document.querySelectorAll("[data-select-model]:checked")).map((input) => input.value);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function inlineMarkdown(text) {
      return text
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\*([^*]+)\*/g, "<em>$1</em>")
        .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
    }

    function renderMarkdown(text) {
      const lines = escapeHtml(text).replace(/\r/g, "").split("\n");
      const output = [];
      let paragraph = [];
      let listType = "";
      let codeLines = null;

      function flushParagraph() {
        if (paragraph.length) output.push("<p>" + inlineMarkdown(paragraph.join("<br>")) + "</p>");
        paragraph = [];
      }

      function closeList() {
        if (listType) output.push(`</${listType}>`);
        listType = "";
      }

      lines.forEach((line) => {
        if (line.startsWith("```")) {
          flushParagraph();
          closeList();
          if (codeLines) {
            output.push("<pre><code>" + codeLines.join("\n") + "</code></pre>");
            codeLines = null;
          } else {
            codeLines = [];
          }
          return;
        }

        if (codeLines) {
          codeLines.push(line);
          return;
        }

        if (!line.trim()) {
          flushParagraph();
          closeList();
          return;
        }

        const heading = line.match(/^(#{1,3})\s+(.+)$/);
        const bullet = line.match(/^\s*[-*]\s+(.+)$/);
        const ordered = line.match(/^\s*\d+\.\s+(.+)$/);
        const quote = line.match(/^&gt;\s?(.*)$/);

        if (heading) {
          flushParagraph();
          closeList();
          output.push(`<h${heading[1].length}>${inlineMarkdown(heading[2])}</h${heading[1].length}>`);
          return;
        }

        if (bullet || ordered) {
          flushParagraph();
          const nextType = bullet ? "ul" : "ol";
          if (listType !== nextType) {
            closeList();
            listType = nextType;
            output.push(`<${listType}>`);
          }
          output.push("<li>" + inlineMarkdown((bullet || ordered)[1]) + "</li>");
          return;
        }

        if (quote) {
          flushParagraph();
          closeList();
          output.push("<blockquote>" + inlineMarkdown(quote[1]) + "</blockquote>");
          return;
        }

        paragraph.push(line);
      });

      flushParagraph();
      closeList();
      if (codeLines) output.push("<pre><code>" + codeLines.join("\n") + "</code></pre>");
      return output.join("");
    }

    function templateVariables(...texts) {
      const seen = new Set();
      const result = [];
      texts.forEach((text) => {
        String(text || "").replace(/\{\{\s*([A-Za-z0-9_.-]+)\s*\}\}/g, (_, name) => {
          if (!seen.has(name)) {
            seen.add(name);
            result.push(name);
          }
          return _;
        });
      });
      return result;
    }

    function parseBatch(text, names) {
      const values = {};
      String(text || "").split(/\r?\n/).forEach((line) => {
        const trimmed = line.trim();
        const match = trimmed.match(/^(?:\{\{\s*)?([A-Za-z0-9_.-]+)(?:\s*\}\})?\s*[:=：]\s*(.+)$/)
          || trimmed.match(/^\{\{\s*([A-Za-z0-9_.-]+)\s*\}\}\s+(.+)$/);
        if (match && names.includes(match[1])) values[match[1]] = match[2].trim();
      });
      return values;
    }

    function renderProjectSelect() {
      $("projectSelect").innerHTML = state.projects.map((project) =>
        `<option value="${escapeHtml(project.id)}">${escapeHtml(project.name)}</option>`
      ).join("");
      $("projectSelect").value = state.projectId;
    }

    function renderPromptVersions() {
      const project = currentProject();
      if (!project) return;
      if (!state.promptId || !project.promptVersions.some((prompt) => prompt.id === state.promptId)) {
        state.promptId = project.promptVersions[0].id;
      }
      $("promptVersionList").innerHTML = project.promptVersions.map((prompt) => `
        <div class="version-row ${prompt.id === state.promptId ? "active" : ""}">
          <button class="version-pick" data-edit-prompt="${escapeHtml(prompt.id)}" type="button">
            <strong>${escapeHtml(prompt.name)}</strong>
            <small>${escapeHtml((prompt.userPrompt || "").slice(0, 54))}</small>
          </button>
        </div>
      `).join("");
      renderPromptSelectors();
      renderPromptForm();
    }

    function renderPromptSelectors() {
      const project = currentProject();
      if (!project) return;
      $("promptSelectList").innerHTML = project.promptVersions.map((prompt) => `
        <label class="check-row">
          <input data-select-prompt value="${escapeHtml(prompt.id)}" type="checkbox"
            ${project.draft.selectedPromptVersionIds.includes(prompt.id) ? "checked" : ""} />
          <span><strong>${escapeHtml(prompt.name)}</strong><small>${escapeHtml((prompt.systemPrompt || "").slice(0, 64))}</small></span>
        </label>
      `).join("");
    }

    function renderPromptForm() {
      const project = currentProject();
      const prompt = project && project.promptVersions.find((item) => item.id === state.promptId);
      $("promptForm").classList.toggle("hidden", !prompt);
      if (!prompt) return;
      $("promptName").value = prompt.name;
      $("systemPrompt").value = prompt.systemPrompt;
      $("userPrompt").value = prompt.userPrompt;
    }

    function renderModelSelectors() {
      const project = currentProject();
      if (!state.models.length) {
        $("modelSelectList").innerHTML = '<div class="empty">还没有模型配置。</div>';
        return;
      }
      $("modelSelectList").innerHTML = state.models.map((model) => `
        <label class="check-row">
          <input data-select-model value="${escapeHtml(model.id)}" type="checkbox"
            ${project && project.draft.selectedModelConfigIds.includes(model.id) ? "checked" : ""} />
          <span><strong>${escapeHtml(model.name)}</strong><small>${escapeHtml(model.model)} · ${escapeHtml(model.baseUrl)}</small></span>
        </label>
      `).join("");
    }

    function renderVariables() {
      const project = currentProject();
      if (!project) return;
      const selected = promptsForVariableRecognition();
      const usage = variableUsage(selected);
      const names = Array.from(usage.keys());
      const values = project.draft.variableValues || {};
      if (!names.length) {
        $("variableList").innerHTML = '<div class="empty">还没有识别到变量。</div>';
        return;
      }
      $("variableList").innerHTML = names.map((name) => `
        <label class="variable-row">
          <span class="variable-label">
            <strong>{{${escapeHtml(name)}}}</strong>
            <small>${escapeHtml(variableUsageText(usage.get(name), selected.length))}</small>
          </span>
          <input data-variable="${escapeHtml(name)}" value="${escapeHtml(values[name] || "")}" />
        </label>
      `).join("");
    }

    function promptsForVariableRecognition() {
      const project = currentProject();
      if (!project) return [];
      const relevantIds = new Set(selectedPromptIds());
      return project.promptVersions
        .filter((prompt) => relevantIds.has(prompt.id))
        .map((prompt) => prompt.id === state.promptId ? {
          ...prompt,
          systemPrompt: $("systemPrompt").value,
          userPrompt: $("userPrompt").value
        } : prompt);
    }

    function variableUsage(prompts) {
      const usage = new Map();
      prompts.forEach((prompt) => {
        templateVariables(prompt.systemPrompt, prompt.userPrompt).forEach((name) => {
          if (!usage.has(name)) usage.set(name, []);
          usage.get(name).push(prompt.name);
        });
      });
      return usage;
    }

    function variableUsageText(promptNames, totalPrompts) {
      if (!promptNames || !promptNames.length) return "未使用";
      if (promptNames.length === totalPrompts) return "全部已选 Prompt 使用";
      return `${promptNames.join("、")} 使用`;
    }

	    function renderVariableSamples() {
	      const project = currentProject();
	      const samples = project && Array.isArray(project.variableSamples) ? project.variableSamples : [];
	      $("variableSampleSelect").innerHTML = samples.length
        ? samples.map((sample) => `<option value="${escapeHtml(sample.id)}">${escapeHtml(sample.name)}</option>`).join("")
        : '<option value="">暂无样例</option>';
      $("variableSampleSelect").disabled = !samples.length;
	      $("loadVariableSampleBtn").disabled = !samples.length;
	      $("deleteVariableSampleBtn").disabled = !samples.length;
	    }

	    function ensureWorkflowSelection() {
	      const workflows = projectWorkflows();
	      if (!workflows.length) {
	        state.workflowId = "";
	        state.currentWorkflowRun = null;
	        return null;
	      }
	      if (!state.workflowId || !workflows.some((workflow) => workflow.id === state.workflowId)) {
	        state.workflowId = workflows[0].id;
	        state.currentWorkflowRun = null;
	      }
	      return currentWorkflow();
	    }

	    function renderWorkflowList() {
	      const workflows = projectWorkflows();
	      $("renameWorkflowBtn").disabled = !workflows.length;
	      $("deleteWorkflowBtn").disabled = !workflows.length;
	      $("workflowList").innerHTML = workflows.length ? workflows.map((workflow) => `
	        <button class="workflow-row ${workflow.id === state.workflowId ? "active" : ""}" data-select-workflow="${escapeHtml(workflow.id)}">
	          <strong>${escapeHtml(workflow.name)}</strong>
	          <small>${workflow.steps.length} 个 Step</small>
	        </button>
